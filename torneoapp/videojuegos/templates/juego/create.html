{% extends "base.html" %}

{% block content %}
<div class="container mt-4">

    <h2>Crear Juego</h2>

    <form method="POST">

        <div class="mb-3">
            <label class="form-label">Nombre</label>
            <input type="text"
                   class="form-control"
                   name="nombre"
                   required>
        </div>

        <div class="mb-3">
            <label class="form-label">Género</label>
            <input type="text"
                   class="form-control"
                   name="genero"
                   required>
        </div>

        <div class="mb-3">
            <label class="form-label">Descripción</label>
            <textarea class="form-control"
                      name="descripcion"
                      rows="4"
                      required></textarea>
        </div>

        <button type="submit"
                class="btn btn-success">
            Guardar
        </button>

        <a href="{{ url_for('bp_juego.index') }}"
           class="btn btn-secondary">
            Cancelar
        </a>

    </form>

</div>
{% endblock %}
