{% extends "base.html" %}

{% block content %}
<div class="container mt-4">

    <h2>Lista de Juegos</h2>

    <a href="{{ url_for('bp_juego.create') }}"
       class="btn btn-success mb-3">
        Nuevo Juego
    </a>

    <table class="table table-bordered table-striped">

        <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Género</th>
                <th>Descripción</th>
                <th>Acciones</th>
            </tr>
        </thead>

        <tbody>
        {% for juego in juegos %}
            <tr>
                <td>{{ juego.id }}</td>
                <td>{{ juego.nombre }}</td>
                <td>{{ juego.genero }}</td>
                <td>{{ juego.descripcion }}</td>

                <td>
                    <a href="{{ url_for('bp_juego.editar',
                                        id=juego.id) }}"
                       class="btn btn-warning btn-sm">
                        Editar
                    </a>

                    <form method="POST"
                          action="{{ url_for('bp_juego.eliminar',
                                             id=juego.id) }}"
                          style="display:inline;">

                        <button type="submit"
                                class="btn btn-danger btn-sm">
                            Eliminar
                        </button>

                    </form>
                </td>
            </tr>
        {% endfor %}
        </tbody>

    </table>

</div>
{% endblock %}
