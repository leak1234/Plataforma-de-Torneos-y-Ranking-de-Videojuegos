{% extends 'base.html' %}

{% block content %}
<h1>Resultados</h1>
<a href="{{ url_for('bp_resultados.create') }}">nuevo resultado</a>
<ul>
    {% for item in resultados %}
    <li> nombre: {{ item.nombre_resultado }}, descripcion: {{ item.descripcion }}, fecha: {{ item.fecha }}</li>
    {% else %}
    <li>no hay resultados</li>
    {% endfor %}
</ul>
{%endblock %}
