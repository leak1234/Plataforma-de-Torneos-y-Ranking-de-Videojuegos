{% extends 'base.html' %}

{% block content %}
<h1>lista de torneos</h1>
<a href="{{ url_for('bp_torneos.create') }}">nuevo torneo</a>
<ul>
    {% for item in torneos %}
    <li> nombre: {{ item.nombre }}, descripcion: {{ item.descripcion }}, fecha de inicio: {{ item.fecha_inicio }}</li>
    {% else %}
    <li>no hay usuarios</li>
    {% endfor %}
</ul>
{%endblock %}
