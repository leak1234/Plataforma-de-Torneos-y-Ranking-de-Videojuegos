{% extends "base.html" %}

{% block content %}
<div class="container mt-4">

    <h2>Editar Inscripción</h2>

    <form method="POST">

        <div class="mb-3">
            <label class="form-label">
                Fecha de inscripción
            </label>

            <input type="date"
                   class="form-control"
                   name="fecha_inscripcion"
                   value="{{ torneo_equipo.fecha_inscripcion.strftime('%Y-%m-%d') if torneo_equipo.fecha_inscripcion else '' }}"
                   required>
        </div>

        <!--
        <div class="mb-3">
            <label class="form-label">Equipo ID</label>
            <input type="number"
                   class="form-control"
                   name="equipo_id"
                   value="{{ torneo_equipo.equipo_id }}">
        </div>
        -->

        <button type="submit"
                class="btn btn-primary">
            Actualizar
        </button>

        <a href="{{ url_for('bp_torneo_equipo.index') }}"
           class="btn btn-secondary">
            Cancelar
        </a>

    </form>

</div>
{% endblock %}
