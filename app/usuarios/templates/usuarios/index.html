{% extends "base.html" %}

{% block content %}

<h2>Usuarios</h2>

<a class="btn btn-primary mb-3" href="{{url_for('bp_usuarios.create')}}">
    Nuevo Usuario
</a>


<table class="table table-dark">

    <tr>
        <th>ID</th>
        <th>Usuario</th>
        <th>Correo</th>
        <th>Rol</th>
        <th>Estado</th>
        <th>Acciones</th>
    </tr>


    {% for u in usuarios %}

    <tr>

        <td>{{u.id_usuario}}</td>

        <td>{{u.usuario}}</td>

        <td>{{u.correo}}</td>

        <td>{{u.rol}}</td>

        <td>{{u.estado}}</td>


        <td>

            <a class="btn btn-warning btn-sm" href="{{url_for('bp_usuarios.editar',id=u.id_usuario)}}">

                Editar

            </a>


            <a class="btn btn-danger btn-sm" href="{{url_for('bp_usuarios.eliminar',id=u.id_usuario)}}">

                Eliminar

            </a>

        </td>


    </tr>


    {% endfor %}


</table>


{% endblock %}
