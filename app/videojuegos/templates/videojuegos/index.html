{% extends "base.html" %}

{% block content %}

<h2>Videojuegos</h2>


<a class="btn btn-primary mb-3" href="{{url_for('bp_videojuegos.create')}}">

    Nuevo Videojuego

</a>



<table class="table table-dark">


    <tr>

        <th>ID</th>

        <th>Nombre</th>

        <th>Genero</th>

        <th>Estado</th>

        <th>Acciones</th>

    </tr>



    {% for v in videojuegos %}


    <tr>


        <td>{{v.id_videojuego}}</td>

        <td>{{v.nombre}}</td>

        <td>{{v.genero}}</td>

        <td>{{v.estado}}</td>


        <td>


            <a class="btn btn-warning btn-sm" href="{{url_for('bp_videojuegos.editar',id=v.id_videojuego)}}">

                Editar

            </a>



            <a class="btn btn-danger btn-sm" href="{{url_for('bp_videojuegos.eliminar',id=v.id_videojuego)}}">

                Eliminar

            </a>


        </td>


    </tr>



    {% endfor %}



</table>


{% endblock %}
